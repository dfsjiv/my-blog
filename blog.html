<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dfsjiv 的个人博客</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div>
          <div class="sidebar-title">dfsjiv</div>
          <div class="sidebar-subtitle">个人博客</div>
        </div>
        <button class="toggle-btn" id="toggleBtn" aria-label="切换侧边栏">≡</button>
      </div>

      <nav class="nav-list">
        <button class="nav-item active" data-page="home">首页</button>
        <button class="nav-item" data-page="algorithm">算法文章</button>
        <button class="nav-item" data-page="tech">计算机技术</button>
        <button class="nav-item" data-page="essay">个人随笔</button>
        <button class="nav-item" data-page="mystery">神秘图片</button>
      </nav>

      <div class="sidebar-footer">
        <a class="github-link" href="https://github.com/dfsjiv" target="_blank" rel="noreferrer">GitHub</a>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换主题">
          <span class="theme-circle"></span>
          <span class="theme-label">切换主题</span>
        </button>
      </div>
    </aside>

    <div class="main-panel">
      <header class="topbar">
        <div class="topbar-page">
          <h1 class="page-title" id="pageTitle">首页</h1>
          <p class="page-summary" id="pageSummary"></p>
        </div>
        <div class="topbar-tools">
          <label class="article-search">
            <span class="visually-hidden">搜索文章</span>
            <input id="articleSearchInput" type="search" placeholder="搜索文章..." autocomplete="off" />
          </label>
          <div class="page-actions" id="pageActions"></div>
        </div>
      </header>
      <section class="page-content" id="pageContent">
        <div class="card">
          <h2>my blog</h2>
        </div>
      </section>

      <footer class="footer">
      </footer>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
