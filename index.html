<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dfsjiv 的个人博客</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <div>
          <div class="sidebar-title">目录</div>
          <div class="sidebar-subtitle">功能导航</div>
        </div>
        <button class="toggle-btn" id="toggleBtn" aria-label="切换侧边栏">≡</button>
      </div>

      <nav class="nav-list">
        <button class="nav-item active" data-page="home">首页</button>
        <button class="nav-item" data-page="algorithm">算法文章</button>
        <button class="nav-item" data-page="tech">计算机技术</button>
        <button class="nav-item" data-page="essay">个人随笔</button>
        <button class="nav-item" data-page="mystery">神秘图片</button>
      </nav>
    </aside>

    <div class="main-panel">
      <header class="topbar">
      <div class="topbar-left">
        <div class="brand">
          <div class="brand-name">dfsjiv</div>
          <div class="brand-tag">个人博客</div>
        </div>
        <div class="topbar-page">
          <h1 class="page-title" id="pageTitle">首页</h1>
          <p class="page-summary" id="pageSummary">简洁的首页视图，展示博客的主要入口与简介。</p>
        </div>
      </div>
      <div class="topbar-right">
        <a class="top-link" href="https://github.com/dfsjiv" target="_blank">GitHub</a>
        <button id="themeToggle" class="theme-toggle" type="button" aria-label="切换主题">
          <span class="theme-circle"></span>
        </button>
      </div>
    </header>
      <section class="page-content" id="pageContent">
        <div class="card">
          <h2>欢迎来到我的博客</h2>
          <p>这里是我的个人空间，未来会展示算法文章、计算机技术与随笔。你可以通过左侧菜单切换不同内容。</p>
        </div>
      </section>

      <footer class="footer">
      </footer>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
