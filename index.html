<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dfsjiv</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111316;
      --surface: #1f222a;
      --text: #f8fafc;
      --muted: #a8b0cc;
      --border: rgba(255, 255, 255, 0.12);
      --accent: #9ca5ff;
      --accent-soft: rgba(156, 165, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }
  </style>
  <link rel="stylesheet" href="home-desktop.css" />
</head>
<body class="auth-pending">
  <main class="login-screen" id="loginScreen" aria-label="登录">
    <div class="login-panel">
      <img class="login-avatar" src="assets/blog-icon.png" alt="" draggable="false" />
      <h1>账户登录</h1>
      <form class="login-form" id="loginForm" novalidate>
        <label class="login-field">
          <span>用户名</span>
          <input id="loginUsername" name="username" type="text" autocomplete="username" placeholder="用户名" />
        </label>
        <div class="login-password-row">
          <label class="login-field login-password-field">
            <span>密码</span>
            <input id="loginPassword" name="password" type="password" autocomplete="current-password" placeholder="密码" />
          </label>
          <button class="login-submit" id="loginButton" type="submit" aria-label="登录">→</button>
        </div>
        <p class="login-message" id="loginMessage" role="alert" aria-live="polite"></p>
        <button class="login-guest" id="guestButton" type="button">以游客身份进入</button>
      </form>
    </div>
    <div class="login-system-icons" aria-label="系统状态">
      <span class="login-system-icon network-icon" title="网络" aria-label="网络"><i></i><i></i><i></i></span>
      <span class="login-system-icon accessibility-icon" title="辅助功能" aria-label="辅助功能">♿</span>
      <span class="login-system-icon power-icon" title="电源" aria-label="电源">⏻</span>
    </div>
  </main>

  <div class="desktop-shell" id="desktopShell" aria-label="Windows 10 风格桌面" aria-hidden="true">
    <div class="desktop-surface" id="desktopSurface">
      <button class="desktop-icon" id="blogDesktopIcon" type="button" aria-label="博客" aria-selected="false">
        <span class="desktop-icon-image document-app-icon" aria-hidden="true">
          <img src="assets/blog-icon.png" alt="" draggable="false" />
        </span>
        <span class="desktop-icon-label">博客</span>
      </button>

      <button class="desktop-icon chat-desktop-icon" id="chatDesktopIcon" type="button" aria-label="聊天室" aria-selected="false">
        <span class="desktop-icon-image chat-app-icon" aria-hidden="true"><img src="assets/chat-icon.png" alt="" draggable="false" /></span>
        <span class="desktop-icon-label">聊天室</span>
      </button>

      <button class="desktop-icon ai-desktop-icon" id="aiDesktopIcon" type="button" aria-label="AI" aria-selected="false">
        <span class="desktop-icon-image ai-app-icon" aria-hidden="true">AI</span>
        <span class="desktop-icon-label">AI</span>
      </button>

      <section class="blog-window is-hidden" id="blogWindow" aria-label="博客窗口">
        <header class="window-titlebar" id="blogTitlebar">
          <span class="window-app-icon document-app-icon" aria-hidden="true">
            <img src="assets/blog-icon.png" alt="" draggable="false" />
          </span>
          <span class="window-title">博客</span>
          <div class="window-controls" aria-label="窗口控制">
            <button class="window-control" id="windowMinimize" type="button" aria-label="最小化">—</button>
            <button class="window-control" id="windowMaximize" type="button" aria-label="最大化">□</button>
            <button class="window-control close" id="windowClose" type="button" aria-label="关闭">×</button>
          </div>
        </header>
        <iframe class="blog-frame" id="blogFrame" src="blog.html" title="博客内容"></iframe>
        <span class="window-resize-handle resize-n" id="resizeN" data-resize-edge="n" aria-hidden="true"></span>
        <span class="window-resize-handle resize-e" id="resizeE" data-resize-edge="e" aria-hidden="true"></span>
        <span class="window-resize-handle resize-s" id="resizeS" data-resize-edge="s" aria-hidden="true"></span>
        <span class="window-resize-handle resize-w" id="resizeW" data-resize-edge="w" aria-hidden="true"></span>
        <span class="window-resize-handle resize-ne" id="resizeNE" data-resize-edge="ne" aria-hidden="true"></span>
        <span class="window-resize-handle resize-se" id="resizeSE" data-resize-edge="se" aria-hidden="true"></span>
        <span class="window-resize-handle resize-sw" id="resizeSW" data-resize-edge="sw" aria-hidden="true"></span>
        <span class="window-resize-handle resize-nw" id="resizeNW" data-resize-edge="nw" aria-hidden="true"></span>
      </section>

      <section class="chat-window is-hidden" id="chatWindow" aria-label="聊天室窗口">
        <header class="window-titlebar" id="chatTitlebar">
          <span class="window-app-icon chat-app-icon" aria-hidden="true"><img src="assets/chat-icon.png" alt="" draggable="false" /></span>
          <span class="window-title">聊天室</span>
          <div class="window-controls" aria-label="聊天室窗口控制">
            <button class="window-control" id="chatMinimize" type="button" aria-label="最小化">—</button>
            <button class="window-control" id="chatMaximize" type="button" aria-label="最大化">□</button>
            <button class="window-control close" id="chatClose" type="button" aria-label="关闭">×</button>
          </div>
        </header>
        <div class="chat-layout">
          <aside class="chat-sidebar">
            <h2>公共大厅</h2>
            <div class="chat-online-summary"><span>在线人数</span><strong id="chatOnlineCount">--</strong></div>
            <h3>在线用户</h3>
            <div class="chat-online-users" id="chatOnlineUsers">
              <p class="chat-online-placeholder">正在连接...</p>
            </div>
          </aside>
          <main class="chat-main">
            <div class="chat-messages" id="chatMessages" aria-live="polite"></div>
            <div class="chat-compose" id="chatCompose"></div>
          </main>
        </div>
        <span class="window-resize-handle resize-n" data-chat-resize-edge="n" aria-hidden="true"></span>
        <span class="window-resize-handle resize-e" data-chat-resize-edge="e" aria-hidden="true"></span>
        <span class="window-resize-handle resize-s" data-chat-resize-edge="s" aria-hidden="true"></span>
        <span class="window-resize-handle resize-w" data-chat-resize-edge="w" aria-hidden="true"></span>
        <span class="window-resize-handle resize-ne" data-chat-resize-edge="ne" aria-hidden="true"></span>
        <span class="window-resize-handle resize-se" data-chat-resize-edge="se" aria-hidden="true"></span>
        <span class="window-resize-handle resize-sw" data-chat-resize-edge="sw" aria-hidden="true"></span>
        <span class="window-resize-handle resize-nw" data-chat-resize-edge="nw" aria-hidden="true"></span>
      </section>

      <section class="ai-window is-hidden" id="aiWindow" aria-label="AI 窗口">
        <header class="window-titlebar" id="aiTitlebar">
          <span class="window-app-icon ai-app-icon" aria-hidden="true">AI</span>
          <span class="window-title">AI</span>
          <div class="window-controls" aria-label="AI 窗口控制">
            <button class="window-control" id="aiMinimize" type="button" aria-label="最小化">—</button>
            <button class="window-control" id="aiMaximize" type="button" aria-label="最大化">□</button>
            <button class="window-control close" id="aiClose" type="button" aria-label="关闭">×</button>
          </div>
        </header>
        <main class="ai-chat-main">
          <div class="ai-reply-area" id="aiReplyArea" aria-live="polite">
            <div class="ai-reply-message" id="aiReplyMessage">你好。</div>
          </div>
          <form class="ai-input-area" id="aiInputForm">
            <textarea class="ai-input" id="aiInput" rows="2" placeholder="输入消息..." aria-label="输入消息"></textarea>
            <button class="ai-send-button" type="submit">发送</button>
          </form>
        </main>
        <span class="window-resize-handle resize-n" data-ai-resize-edge="n" aria-hidden="true"></span>
        <span class="window-resize-handle resize-e" data-ai-resize-edge="e" aria-hidden="true"></span>
        <span class="window-resize-handle resize-s" data-ai-resize-edge="s" aria-hidden="true"></span>
        <span class="window-resize-handle resize-w" data-ai-resize-edge="w" aria-hidden="true"></span>
        <span class="window-resize-handle resize-ne" data-ai-resize-edge="ne" aria-hidden="true"></span>
        <span class="window-resize-handle resize-se" data-ai-resize-edge="se" aria-hidden="true"></span>
        <span class="window-resize-handle resize-sw" data-ai-resize-edge="sw" aria-hidden="true"></span>
        <span class="window-resize-handle resize-nw" data-ai-resize-edge="nw" aria-hidden="true"></span>
      </section>
    </div>

    <nav class="start-menu" id="startMenu" aria-label="开始菜单">
      <header class="start-menu-user">
        <strong id="startUserName">Guest</strong>
        <span id="startUserRole">游客模式</span>
      </header>

      <section class="start-menu-apps" aria-labelledby="startAppsTitle">
        <h2 id="startAppsTitle">应用</h2>
        <button class="start-menu-app" id="startBlogButton" type="button">
          <span class="start-menu-icon document-app-icon" aria-hidden="true">
            <img src="assets/blog-icon.png" alt="" draggable="false" />
          </span>
          <span class="start-menu-app-copy">
            <strong>博客</strong>
            <small id="startBlogStatus">文章、随笔与图片</small>
          </span>
        </button>
        <button class="start-menu-app" id="startChatButton" type="button">
          <span class="start-menu-icon chat-app-icon" aria-hidden="true">
            <img src="assets/chat-icon.png" alt="" draggable="false" />
          </span>
          <span class="start-menu-app-copy">
            <strong>聊天室</strong>
            <small id="startChatStatus">公共大厅</small>
          </span>
        </button>
        <button class="start-menu-app" id="startAiButton" type="button">
          <span class="start-menu-icon ai-app-icon" aria-hidden="true">AI</span>
          <span class="start-menu-app-copy">
            <strong>AI</strong>
            <small id="startAiStatus">本地测试</small>
          </span>
        </button>
      </section>

      <div class="start-menu-actions">
        <a class="start-menu-action" href="https://github.com/dfsjiv" target="_blank" rel="noreferrer">GitHub</a>
        <button class="start-menu-action" id="startThemeButton" type="button" aria-pressed="false">切换主题</button>
        <button class="start-menu-action" id="logoutButton" type="button">退出登录</button>
      </div>
    </nav>

    <footer class="taskbar" aria-label="任务栏">
      <button class="start-button" id="startButton" type="button" aria-label="开始" aria-expanded="false">
        <span class="windows-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
      </button>
      <button class="taskbar-app" id="blogTaskbarButton" type="button" aria-label="博客" aria-pressed="false">
        <span class="taskbar-app-icon document-app-icon" aria-hidden="true">
          <img src="assets/blog-icon.png" alt="" draggable="false" />
        </span>
      </button>
      <button class="taskbar-app" id="chatTaskbarButton" type="button" aria-label="聊天室" aria-pressed="false">
        <span class="taskbar-app-icon chat-app-icon" aria-hidden="true"><img src="assets/chat-icon.png" alt="" draggable="false" /></span>
      </button>
      <button class="taskbar-app" id="aiTaskbarButton" type="button" aria-label="AI" aria-pressed="false">
        <span class="taskbar-app-icon ai-app-icon" aria-hidden="true">AI</span>
      </button>
      <div class="taskbar-spacer"></div>
      <time class="taskbar-clock" aria-label="当前时间">
        <span id="clockTime"></span>
        <span id="clockDate"></span>
      </time>
    </footer>
  </div>

  <script src="home-device.js"></script>
  <script src="home-desktop.js"></script>
  <script src="auth.js"></script>
  <script src="chat.js"></script>
  <script src="ai-chat.js"></script>
</body>
</html>
