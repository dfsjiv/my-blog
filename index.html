<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dfsjiv</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111316;
      --surface: #1f222a;
      --text: #f8fafc;
      --muted: #a8b0cc;
      --border: rgba(255, 255, 255, 0.12);
      --accent: #9ca5ff;
      --accent-soft: rgba(156, 165, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .home-entry {
      width: min(100%, 520px);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .home-entry h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
      line-height: 1.2;
    }

    .home-entry p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .blog-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 26px;
      border: 1px solid rgba(156, 165, 255, 0.35);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .blog-button:hover {
      transform: translateY(-2px);
      border-color: rgba(156, 165, 255, 0.7);
      background: rgba(156, 165, 255, 0.22);
    }
  </style>
</head>
<body>
  <main class="home-entry">
    <h1>dfsjiv</h1>
    <p>欢迎来到我的主页。</p>
    <a class="blog-button" href="blog.html">进入我的博客</a>
  </main>
</body>
</html>
