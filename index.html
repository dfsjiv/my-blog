<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>dfsjiv</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #111316;
      --surface: #1f222a;
      --text: #f8fafc;
      --muted: #a8b0cc;
      --border: rgba(255, 255, 255, 0.12);
      --accent: #9ca5ff;
      --accent-soft: rgba(156, 165, 255, 0.16);
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
    }

    .home-entry {
      width: min(100%, 520px);
      padding: 36px;
      border: 1px solid var(--border);
      border-radius: 24px;
      background: var(--surface);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.25);
      text-align: center;
    }

    .home-entry h1 {
      margin: 0 0 12px;
      font-size: 1.8rem;
      line-height: 1.2;
    }

    .home-entry p {
      margin: 0 0 28px;
      color: var(--muted);
      line-height: 1.7;
    }

    .blog-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 48px;
      padding: 0 26px;
      border: 1px solid rgba(156, 165, 255, 0.35);
      border-radius: 999px;
      background: var(--accent-soft);
      color: var(--text);
      font-size: 1rem;
      font-weight: 700;
      text-decoration: none;
      transition: transform 0.2s ease, border-color 0.2s ease, background 0.2s ease;
    }

    .blog-button:hover {
      transform: translateY(-2px);
      border-color: rgba(156, 165, 255, 0.7);
      background: rgba(156, 165, 255, 0.22);
    }
  </style>
  <link rel="stylesheet" href="home-desktop.css" />
</head>
<body>
  <main class="home-entry">
    <h1>dfsjiv</h1>
    <p>欢迎来到我的主页。</p>
    <a class="blog-button" href="blog.html">进入我的博客</a>
  </main>

  <div class="desktop-shell" id="desktopShell" aria-label="Windows 10 风格桌面">
    <div class="desktop-surface" id="desktopSurface">
      <button class="desktop-icon" id="blogDesktopIcon" type="button" aria-label="博客" aria-selected="false">
        <span class="desktop-icon-image document-app-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" focusable="false">
            <path d="M11 5h18l8 8v30H11z" fill="#f4f8ff" />
            <path d="M29 5v9h8z" fill="#c9ddff" />
            <path d="M17 21h14M17 27h16M17 33h12" stroke="#1769aa" stroke-width="2" stroke-linecap="square" />
          </svg>
        </span>
        <span class="desktop-icon-label">博客</span>
      </button>

      <section class="blog-window is-hidden" id="blogWindow" aria-label="博客窗口">
        <header class="window-titlebar" id="blogTitlebar">
          <span class="window-app-icon document-app-icon" aria-hidden="true">
            <svg viewBox="0 0 48 48" focusable="false">
              <path d="M11 5h18l8 8v30H11z" fill="#f4f8ff" />
              <path d="M29 5v9h8z" fill="#c9ddff" />
              <path d="M17 21h14M17 27h16M17 33h12" stroke="#1769aa" stroke-width="2" stroke-linecap="square" />
            </svg>
          </span>
          <span class="window-title">博客</span>
          <div class="window-controls" aria-label="窗口控制">
            <button class="window-control" id="windowMinimize" type="button" aria-label="最小化">—</button>
            <button class="window-control" id="windowMaximize" type="button" aria-label="最大化">□</button>
            <button class="window-control close" id="windowClose" type="button" aria-label="关闭">×</button>
          </div>
        </header>
        <iframe class="blog-frame" id="blogFrame" src="blog.html" title="博客内容"></iframe>
      </section>
    </div>

    <nav class="start-menu" id="startMenu" aria-label="开始菜单">
      <button class="start-menu-app" id="startBlogButton" type="button">
        <span class="start-menu-icon document-app-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" focusable="false">
            <path d="M11 5h18l8 8v30H11z" fill="#f4f8ff" />
            <path d="M29 5v9h8z" fill="#c9ddff" />
            <path d="M17 21h14M17 27h16M17 33h12" stroke="#1769aa" stroke-width="2" stroke-linecap="square" />
          </svg>
        </span>
        <span>博客</span>
      </button>
    </nav>

    <footer class="taskbar" aria-label="任务栏">
      <button class="start-button" id="startButton" type="button" aria-label="开始" aria-expanded="false">
        <span class="windows-mark" aria-hidden="true">
          <span></span><span></span><span></span><span></span>
        </span>
      </button>
      <button class="taskbar-app" id="blogTaskbarButton" type="button" aria-label="博客" aria-pressed="false">
        <span class="taskbar-app-icon document-app-icon" aria-hidden="true">
          <svg viewBox="0 0 48 48" focusable="false">
            <path d="M11 5h18l8 8v30H11z" fill="#f4f8ff" />
            <path d="M29 5v9h8z" fill="#c9ddff" />
            <path d="M17 21h14M17 27h16M17 33h12" stroke="#1769aa" stroke-width="2" stroke-linecap="square" />
          </svg>
        </span>
      </button>
      <div class="taskbar-spacer"></div>
      <time class="taskbar-clock" aria-label="当前时间">
        <span id="clockTime"></span>
        <span id="clockDate"></span>
      </time>
    </footer>
  </div>

  <script src="home-device.js"></script>
  <script src="home-desktop.js"></script>
</body>
</html>
